  <text x="78" y="268" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="108" font-weight="800">1052 OS</text>
  <text x="78" y="340" fill="#97B4D6" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="500">A practical personal operating space for chat, tools, files, memory, search and automations.</text>

  <text x="78" y="414" fill="#DCEBFF" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="600">Designed and built by a 17-year-old student developer.</text>
  <text x="78" y="456" fill="#97B4D6" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="500">Not just a demo chat window. It is meant to be used every day.</text>

